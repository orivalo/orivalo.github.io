<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Music Survey</title>
    <style>

        form {
            background-color: #f4f4f4;
            border: 1px solid gray;
            padding: 15px;
            width: 500px;
        }
    </style>
</head>
<body>

    <form action="http://www.uyar.com/teaching/ecc006/2017spring/login.php" method="POST">
        
        Name: <input type="text" name="userName"><br><br>
        
        E-mail: <input type="email" name="userEmail"><br><br>

        Comments:<br>
        <textarea name="comments" cols="60" rows="3"></textarea><br><br>

        <fieldset>
            <legend>Favorite Genre</legend>
            <input type="radio" name="genre" value="rock"> Rock<br>
            <input type="radio" name="genre" value="pop"> Pop<br>
            <input type="radio" name="genre" value="rap"> Rap<br>
        </fieldset><br>

        <fieldset>
            <legend>Music Services</legend>
            <input type="checkbox" name="service" value="spotify"> Spotify<br>
            <input type="checkbox" name="service" value="apple"> Apple Music<br>
            <input type="checkbox" name="service" value="youtube"> YouTube<br>
        </fieldset><br>

        Listen frequency:<br>
        <select name="frequency" size="3">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
            <option value="rarely">Rarely</option>
        </select><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
